data:
  cutoff_angstrom: 10.5
  contact_zone_buffer: 2.0   # extra angstroms beyond cutoff for contact-zone subgraph
  val_frac: 0.1
  test_frac: 0.1
  seed: 42

model:
  hidden_dim: 128
  num_layers: 4
  dropout: 0.1

training:
  lr: 1.0e-3
  batch_size: 32
  max_epochs: 200
  weight_decay: 1.0e-5
